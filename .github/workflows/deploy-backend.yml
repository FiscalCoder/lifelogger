name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: backend

      - name: Create backend env file
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.LIFELOGGER_DATABASE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "LIFELOGGER_DATABASE_URL GitHub secret is required."
            exit 1
          fi

          {
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'HF_TOKEN=%s\n' "$HF_TOKEN"
            printf 'SPEAKER_MATCH_THRESHOLD=0.82\n'
            printf 'MAX_WORKERS=2\n'
            printf 'OMP_NUM_THREADS=2\n'
            printf 'MKL_NUM_THREADS=2\n'
            printf 'OPENBLAS_NUM_THREADS=2\n'
          } > .env

      - name: Deploy backend with docker compose
        working-directory: ./backend
        run: |
          docker compose down
          docker compose build
          docker compose up -d

      - name: Wait for health check
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:10000/health > /dev/null 2>&1; then
              echo "API is healthy!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60 seconds"
          docker compose -f backend/docker-compose.yml logs api
          exit 1
