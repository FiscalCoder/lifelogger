services:
  migrate:
    build: ./api
    profiles:
      - tools
    env_file:
      - .env
    command: npm run db:migrate

  api:
    build: ./api
    container_name: lifelogger-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUDIO_PENDING_DIR: /audio/pending
      AUDIO_ARCHIVE_DIR: /audio/archive
      AUDIO_SAMPLE_DIR: /audio/samples
      PORT: 8000
    volumes:
      - audio_data:/audio
    ports:
      - "10000:8000"

  pipeline:
    build: ./pipeline
    container_name: lifelogger-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUDIO_PENDING_DIR: /audio/pending
      AUDIO_ARCHIVE_DIR: /audio/archive
      AUDIO_SAMPLE_DIR: /audio/samples
      MAX_WORKERS: ${MAX_WORKERS:-2}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-2}
    volumes:
      - audio_data:/audio
      - pipeline_models:/app/models
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 4G

volumes:
  audio_data:
  pipeline_models:
